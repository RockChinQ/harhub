services:
  postgres:
    image: postgres:17-alpine
    container_name: harhub-postgres
    environment:
      POSTGRES_DB: harhub
      POSTGRES_USER: harhub
      POSTGRES_PASSWORD: harhub
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harhub -d harhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: harhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb --ignore-existing local/harhub-assets;
      mc anonymous set download local/harhub-assets || true;
      "

volumes:
  postgres-data:
  minio-data:
